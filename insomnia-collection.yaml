          created: 1773842519101
          modified: 1773842519101
          isPrivate: false
          description: >-
            Sends tools to Claude. Response includes tool_calls when the model decides to use one.
            Feed the tool_calls back as a "tool" role message to continue the conversation.
          sortKey: -1773842519101
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "model": "claude-sonnet-4-6",
              "messages": [
                { "role": "user", "content": "What is the weather in San Francisco?" }
              ],
              "tools": [
                {
                  "type": "function",
                  "function": {
                    "name": "get_weather",
                    "description": "Get the current weather for a location.",
                    "parameters": {
                      "type": "object",
                      "properties": {
                        "location": { "type": "string", "description": "City name" }
                      },
                      "required": ["location"]
                    }
                  }
                }
              ],
              "tool_choice": "auto",
              "max_tokens": 256
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: Authorization
            value: Bearer {{ _.api_key }}
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - url: "{{ _.base_url }}/v1/chat/completions"
        name: "[Claude] Chat Completions (Tool Result)"
        meta:
          id: req_claude_chat_tool_result
          created: 1773842519102
          modified: 1773842519102
          isPrivate: false
          description: >-
            Second turn — sends tool_calls from assistant + tool result back to get the final answer.
            Replace tool_call_id and arguments with values from the previous response.
          sortKey: -1773842519102
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "model": "claude-sonnet-4-6",
              "messages": [
                { "role": "user", "content": "What is the weather in San Francisco?" },
                {
                  "role": "assistant",
                  "content": null,
                  "tool_calls": [
                    {
                      "id": "<tool-call-id-from-previous-response>",
