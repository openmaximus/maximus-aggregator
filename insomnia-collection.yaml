                    "name": "get_weather",
                    "description": "Get the current weather for a location.",
                    "parameters": {
                      "type": "object",
                      "properties": {
                        "location": { "type": "string", "description": "City name" }
                      },
                      "required": ["location"]
                    }
                  }
                }
              ],
              "max_tokens": 256
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: Authorization
