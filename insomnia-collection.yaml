      description: OAuth PKCE flow endpoints for Codex and Claude Code
    children:
      - url: "{{ _.base_url }}/v1/auth/codex"
        name: Get PKCE Authorization URL
        meta:
          id: req_auth_get_url
          created: 1773842519087
          modified: 1773842519087
          isPrivate: false
          sortKey: -1773842519087
          description: >-
            Returns { url, verifier, state }.
            Open the url in a browser to authenticate.
            Save verifier — it is required for the exchange step.
        method: GET
        headers:
          - name: Authorization
            value: Bearer {{ _.api_key }}
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - url: "{{ _.base_url }}/v1/auth/codex/exchange"
        name: Exchange Code for Tokens
        meta:
          id: req_auth_exchange_code
          created: 1773842519087
          modified: 1773842519087
          isPrivate: false
          sortKey: -1773842519088
          description: >-
            Accepts raw code + verifier.
            Returns { accessToken, refreshToken, expiresAt, accountId }.
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "code": "<paste-authorization-code-here>",
              "verifier": "<paste-verifier-from-previous-step>"
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: Authorization
            value: Bearer {{ _.api_key }}
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - url: "{{ _.base_url }}/v1/auth/codex/exchange"
        name: Exchange Callback URL for Tokens
        meta:
          id: req_auth_exchange_url
          created: 1773842519087
          modified: 1773842519087
          isPrivate: false
          sortKey: -1773842519089
          description: >-
            Accepts full callback url + verifier. Code is stripped automatically.
            Returns { accessToken, refreshToken, expiresAt, accountId }.
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "url": "http://localhost:1455/auth/callback?code=<code>&state=<state>",
              "verifier": "<paste-verifier-from-previous-step>"
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: Authorization
            value: Bearer {{ _.api_key }}
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - url: "{{ _.base_url }}/v1/auth/claude"
        name: "[Claude] Get PKCE Authorization URL"
        meta:
          id: req_auth_claude_get_url
          created: 1773842519087
          modified: 1773842519087
          isPrivate: false
          sortKey: -1773842519090
          description: >-
            Returns { url, verifier }.
            Open the url in a browser — Anthropic redirects to console.anthropic.com
            and displays the authorization code there.
            Save verifier — required for the exchange step.
        method: GET
        headers:
          - name: Authorization
            value: Bearer {{ _.api_key }}
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - url: "{{ _.base_url }}/v1/auth/claude/exchange"
        name: "[Claude] Exchange Code for Tokens"
        meta:
          id: req_auth_claude_exchange
          created: 1773842519087
          modified: 1773842519087
          isPrivate: false
          sortKey: -1773842519091
          description: >-
            Accepts code + verifier. "#state" suffix is stripped automatically.
            Returns { accessToken, refreshToken, expiresAt }.
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "code": "<paste-code-from-console.anthropic.com>",
              "verifier": "<paste-verifier-from-previous-step>"
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: Authorization
