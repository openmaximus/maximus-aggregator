      - url: "{{ _.base_url }}/v1/chat/completions"
        name: "[Codex] Chat Completions (Tool Calls)"
        meta:
          id: req_codex_chat_tools
          created: 1773842519103
          modified: 1773842519103
          isPrivate: false
          description: >-
            Sends tools to Codex (Responses API format). Response includes tool_calls when model uses one.
            Tool IDs are fc_ prefixed. Feed results back as "tool" role messages to continue.
          sortKey: -1773842519103
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "model": "gpt-5.1-codex",
              "messages": [
                { "role": "user", "content": "What is the weather in San Francisco?" }
              ],
              "tools": [
                {
                  "type": "function",
                  "function": {
                    "name": "get_weather",
                    "description": "Get the current weather for a location.",
                    "parameters": {
                      "type": "object",
                      "properties": {
                        "location": { "type": "string", "description": "City name" }
                      },
                      "required": ["location"]
                    }
                  }
                }
              ],
              "tool_choice": "auto",
              "max_tokens": 256
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: Authorization
            value: Bearer {{ _.api_key }}
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - url: "{{ _.base_url }}/v1/chat/completions"
        name: "[Codex] Chat Completions (Tool Result)"
        meta:
          id: req_codex_chat_tool_result
          created: 1773842519104
          modified: 1773842519104
          isPrivate: false
          description: >-
            Second turn — sends the assistant tool_calls + tool result back to Codex.
            Use the exact id value from tool_calls[0].id in the previous response (already fc_ prefixed).
            No ID transformation needed — echo it as-is into tool_call_id.
          sortKey: -1773842519104
        method: POST
        body:
          mimeType: application/json
          text: |-
            {
              "model": "gpt-5.1-codex",
              "messages": [
                { "role": "user", "content": "What is the weather in San Francisco?" },
                {
                  "role": "assistant",
                  "content": null,
                  "tool_calls": [
                    {
                      "id": "<fc_xxxx-from-previous-response>",
                      "type": "function",
                      "function": {
                        "name": "get_weather",
                        "arguments": "{\"location\": \"San Francisco\"}"
                      }
                    }
                  ]
                },
                {
                  "role": "tool",
                  "tool_call_id": "<fc_xxxx-from-previous-response>",
                  "content": "72°F and sunny"
                }
              ],
              "tools": [
                {
                  "type": "function",
                  "function": {
                    "name": "get_weather",
                    "description": "Get the current weather for a location.",
                    "parameters": {
                      "type": "object",
                      "properties": {
                        "location": { "type": "string", "description": "City name" }
                      },
                      "required": ["location"]
                    }
                  }
                }
              ],
              "max_tokens": 256
            }
        headers:
          - name: Content-Type
            value: application/json
          - name: Authorization
            value: Bearer {{ _.api_key }}
        settings:
          renderRequestBody: true
          encodeUrl: true
          followRedirects: global
          cookies:
            send: true
            store: true
          rebuildPath: true
      - url: "{{ _.base_url }}/v1/chat/completions"
        name: "[Claude] Chat Completions (Tool Calls)"
        meta:
